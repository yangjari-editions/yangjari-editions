  <style>
    html, body { overflow-x: hidden; }

    /* ── 텍스트 페이지 ── */
    .text-section {
      padding: 0 4mm 40px 4mm;
    }

    .text-label {
      font-size: 18px;
      line-height: 1.15;
      padding: 4mm 0 4mm 0;
    }

    .text-posts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 30px;
      row-gap: 40px;
    }

    .text-post {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
    }

    .text-post-image {
      aspect-ratio: 3 / 2;
      overflow: hidden;
      background: #d0cfc9;
      margin-bottom: 12px;
    }
    .text-post-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.2s;
    }
    .text-post:hover .text-post-image img { opacity: 0.85; }

    .text-post-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .text-post-left {
      display: flex;
      flex-direction: column;
    }

    .text-post-title {
      font-size: 18px;
      line-height: 1.4;
    }

    .text-post-date {
      font-size: 14px;
      color: var(--rule);
      font-family: var(--ui-font);
      margin-top: 4px;
    }

    .text-post-desc {
      font-size: 18px;
      line-height: 1.5;
      color: var(--rule);
    }

    /* ── 모바일 ── */
    @media (max-width: 820px) {
      .text-posts {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      .text-post-meta {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 960px) and (orientation: landscape) {
      body.is-mobile-landscape .text-posts {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      body.is-mobile-landscape .text-post,
      body.is-mobile-landscape .text-post-meta,
      body.is-mobile-landscape .text-post-left,
      body.is-mobile-landscape .text-post-desc {
        min-width: 0;
      }

      body.is-mobile-landscape .text-post-title,
      body.is-mobile-landscape .text-post-desc {
        overflow-wrap: anywhere;
        word-break: keep-all;
      }
    }

    /* ── 뉴스레터 ── */
    .menu-newsletter-wrap { display: flex; flex-direction: column; }
    .menu-newsletter-btn {
      background: none; border: none; cursor: pointer;
      font-family: var(--ui-font); font-size: 18px;
      color: var(--text); text-align: left; padding: 0;
      line-height: 1.75; letter-spacing: -0.01em;
    }
    .menu-newsletter-btn:hover { opacity: 0.5; }
    .menu-newsletter-form { display: flex; flex-direction: column; gap: 0; }
    .menu-newsletter-input {
      background: none; border: none;
      font-family: var(--ui-font); font-size: 18px;
      color: var(--text); padding: 0; outline: none;
      letter-spacing: -0.01em; width: 100%;
      line-height: 1.75; display: block; height: 1.75em;
    }
    .menu-newsletter-input::placeholder { color: var(--text); opacity: 0.5; }
    .menu-newsletter-submit {
      background: none; border: none; cursor: pointer;
      font-family: var(--ui-font); font-size: 18px;
      color: var(--text); text-align: left; padding: 0;
      line-height: 1.75; letter-spacing: -0.01em;
    }
    .menu-newsletter-submit:hover { opacity: 0.5; }
    .menu-newsletter-done { font-size: 18px; line-height: 1.75; color: var(--text); }
  </style>

    (function () {
      const container = document.getElementById('text-posts');
      TEXT_POSTS.forEach(function (post) {
        const a = document.createElement('a');
        a.className = 'text-post';
        a.href = post.href;
        a.innerHTML =

          '</div>' +

              '<div class="text-post-title">' + (post.author ? '<span>' + post.author + '</span><br>' : '') + post.title + '</div>' +
              (post.translator ? '<div class="text-post-date">' + post.translator + '</div>' : '') +
              (post.date ? '<div class="text-post-date">' + post.date + '</div>' : '') +
            '</div>' +
            '<div class="text-post-desc">' + post.desc + '</div>' +
          '</div>';
        container.appendChild(a);
      });
    })();

  <script>


    // 검색
    const searchBtn = document.getElementById('search-btn');
    const searchClose = document.getElementById('search-close');
    const searchOverlay = document.getElementById('header-search-overlay');
    const searchInput = document.getElementById('search-input');
    searchBtn.addEventListener('click', () => {
      searchOverlay.classList.add('is-open');
      searchInput.focus();
    });
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && searchInput.value.trim()) {
        window.location.href = '/search/?q=' + encodeURIComponent(searchInput.value.trim());
      }
    });
    searchClose.addEventListener('click', () => {
      searchOverlay.classList.remove('is-open');
    });

    // 메뉴
    const menuBtn = document.getElementById('menu-btn');
    const menuClose = document.getElementById('menu-close');
    const menuOverlay = document.getElementById('menu-overlay');
    menuBtn.addEventListener('click', () => {
      
      
      document.documentElement.style.overflow = 'hidden';
      document.body.style.overflow = 'hidden';
      menuOverlay.classList.add('is-open');
    });
    menuClose.addEventListener('click', () => {
      
      
      document.documentElement.style.overflow = '';
      document.body.style.overflow = '';
      menuOverlay.classList.remove('is-open');
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        
        
        document.documentElement.style.overflow = '';
      document.body.style.overflow = '';
      menuOverlay.classList.remove('is-open');
      }
    });
  </script>

  <script>
    (function () {
      const body = document.body;

      function syncMobileLandscapeState() {
        const isLandscape = window.matchMedia('(max-width: 960px) and (orientation: landscape)').matches;
        body.classList.toggle('is-mobile-landscape', isLandscape);

        if (!isLandscape) {
          window.scrollTo(0, window.scrollY || 0);
          document.documentElement.scrollLeft = 0;
          document.body.scrollLeft = 0;
        }
      }

      let rafId = null;
      function requestSync() {
        if (rafId) cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(() => {
          syncMobileLandscapeState();
          setTimeout(syncMobileLandscapeState, 60);
          setTimeout(syncMobileLandscapeState, 180);
        });
      }

      window.addEventListener('resize', requestSync, { passive: true });
      window.addEventListener('orientationchange', requestSync, { passive: true });
      window.addEventListener('pageshow', requestSync, { passive: true });
      document.addEventListener('DOMContentLoaded', requestSync);
      requestSync();
    })();
  </script>

  <script>
    (function () {
      const html = document.documentElement;
      let revealed = false;

      function reveal() {
        if (revealed) return;
        revealed = true;
        html.classList.remove('fonts-loading');
        html.classList.add('fonts-ready');
      }

      const timeoutId = setTimeout(reveal, 5000);

      Promise.all([
        document.fonts.load('400 1em "Eulyoo1945"'),
        document.fonts.load('400 1em "GothicA1"'),
        document.fonts.load('300 1em "GothicA1"'),
        document.fonts.load('500 1em "GothicA1"'),
        document.fonts.load('18px "Eulyoo1945"', '앙토냉 아르토, 자크 리비에르와의 서신'),
        document.fonts.load('18px "Eulyoo1945"', '내 영혼은 지치고, 허약하고, 슬프다.'),
        document.fonts.ready
      ]).then(() => {
        clearTimeout(timeoutId);
     
        requestAnimationFrame(reveal);
      }).catch(() => {
        clearTimeout(timeoutId);
        reveal();
      });
    })();
  </script>

  <script>
    const NEWSLETTER_URL = 'https://script.google.com/a/macros/yangjari-editions.com/s/AKfycbye3PjtFxT5sqjFrRoWQkpYe0nVOg1dDmFZ_YD1Q7uH6bdsnCPsmkDwTZ6nMQVRkJRIyQ/exec';
    function openNewsletter() {
      document.getElementById('menu-newsletter-btn').style.display = 'none';
      document.getElementById('menu-newsletter-form').style.display = 'flex';
      document.getElementById('newsletter-name').focus();
    }
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const nameEl = document.getElementById('newsletter-name');
        const emailEl = document.getElementById('newsletter-email');
        if (document.activeElement === nameEl) { emailEl.focus(); e.preventDefault(); }
        else if (document.activeElement === emailEl) { submitNewsletter(); e.preventDefault(); }
      }
    });
    async function submitNewsletter() {
      const name = document.getElementById('newsletter-name').value.trim();
      const email = document.getElementById('newsletter-email').value.trim();
      if (!name || !email) return;
      const submitBtn = document.getElementById('newsletter-submit');
      submitBtn.textContent = '전송 중...';
      submitBtn.style.pointerEvents = 'none';
      fetch(NEWSLETTER_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name, email }) }).catch(() => {});
      setTimeout(() => {
        document.getElementById('menu-newsletter-form').style.display = 'none';
        document.getElementById('newsletter-done').style.display = 'block';
      }, 1000);
    }
  </script>
