<!DOCTYPE html>
<html lang="ko">
<head>
  <script>
    document.documentElement.classList.add('fonts-loading');
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>카탈로그 — 양자리출판사</title>
  <link rel="stylesheet" href="common.css">
  <style>
    /* ── 카탈로그 섹션 ── */
    .catalog-section {
    }

    .catalog-label {
      padding: 4mm 0 4mm 4mm;
      font-size: 18px;
      line-height: 1.15;
    }

    .catalog-track {
      display: flex;
      justify-content: center;
      padding: 0 0 40px 0;
    }

    .catalog-card {
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .catalog-book {
      width: 300px;
      aspect-ratio: 110 / 195;
      position: relative;
      overflow: hidden;
    }

    .catalog-book-front,
    .catalog-book-back {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
    }

    .catalog-book-back { opacity: 0; }



    .catalog-title {
      font-size: 18px;
      text-align: center;
      line-height: 1.4;
      max-width: 200px;
      color: inherit;
      text-decoration: none;
      display: block;
    }

    .catalog-book-link {
      display: block;
      text-decoration: none;
    }

  </style>
</head>
<body>

  <!-- 헤더 -->
  <header class="header" style="position: relative;">
    <div class="logo"><a href="index.html">양자리출판사</a></div>
    <nav class="nav" aria-label="주요 메뉴">
      <a href="catalog.html" class="active">카탈로그</a><span class="spacer">　　</span>
      <a href="text.html">텍스트</a><span class="spacer">　　</span>
      <a href="journal.html">저널</a><span class="spacer">　　</span>
      <a href="scrap.html">스크랩</a>
      <span class="nav-icons">
        <button aria-label="검색" id="search-btn">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="1.2"/>
            <line x1="11.5" y1="11.5" x2="16.5" y2="16.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </button>
        <button aria-label="메뉴" id="menu-btn">
          <svg width="18" height="14" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="0" y1="1" x2="18" y2="1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="0" y1="7" x2="18" y2="7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="0" y1="13" x2="18" y2="13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </button>
      </span>
    </nav>
    <div class="header-search-overlay" id="header-search-overlay">
      <input type="text" placeholder="검색" id="search-input" />
      <button class="header-search-close" id="search-close">닫기</button>
    </div>
  </header>

  <!-- 메뉴 오버레이 -->
  <div class="menu-overlay" id="menu-overlay">
    <div class="menu-overlay-top">
      <div class="menu-overlay-spacer">&nbsp;</div>
      <div class="menu-overlay-nav">
        <span class="menu-overlay-close">
          <span style="display:inline-flex;width:18px;height:18px;"></span>
          <button id="menu-close" aria-label="메뉴 닫기">
            <svg width="18" height="14" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <line x1="0" y1="1" x2="18" y2="1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              <line x1="0" y1="7" x2="18" y2="7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              <line x1="0" y1="13" x2="18" y2="13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
          </button>
        </span>
      </div>
    </div>
    <div class="menu-overlay-body">
      <div class="menu-overlay-links">
        <a href="catalog.html">카탈로그</a>
        <a href="text.html">텍스트</a>
        <a href="journal.html">저널</a>
        <a href="scrap.html">스크랩</a>
        <span class="menu-overlay-spacer"></span>
        <a href="#">이메일</a>
        <a href="#">인스타그램</a>
        <a href="#">온라인스토어</a>
        <span class="menu-overlay-spacer"></span>
        <span>양자리출판사</span>
        <span style="padding-left:0.65em;">(03127)</span>
        <span style="padding-left:0.65em;">서울시 종로구</span>
        <span style="padding-left:0.65em;">대학로 47, 1212</span>
      </div>
    </div>
  </div>

  <!-- 인용문 -->
  <section class="quote">
    <div class="quote-inner" id="quote-inner"></div>
  </section>

  <!-- 카탈로그 -->
  <section class="catalog-section">
    <div class="catalog-label">카탈로그</div>
    <div class="catalog-track" id="catalog-track"></div>
  </section>

  <!-- 푸터 -->
  <footer class="footer">
    © 2026, 양자리출판사
  </footer>

  <script src="quotes-data.js"></script>
  <script>
    // 인용문 렌더링 (quotes-data.js)
    (function () {
      const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
      document.getElementById('quote-inner').innerHTML =
        '<span class="quote-line">' + q.line + '</span>' +
        '<span class="quote-source">' + q.source + '</span>';
    })();
  </script>

  <script src="catalog-data.js"></script>
  <script>


    const searchBtn = document.getElementById('search-btn');
    const searchClose = document.getElementById('search-close');
    const searchOverlay = document.getElementById('header-search-overlay');
    const searchInput = document.getElementById('search-input');
    searchBtn.addEventListener('click', () => { searchOverlay.classList.add('is-open'); searchInput.focus(); });
    searchClose.addEventListener('click', () => { searchOverlay.classList.remove('is-open'); });

    const menuBtn = document.getElementById('menu-btn');
    const menuClose = document.getElementById('menu-close');
    const menuOverlay = document.getElementById('menu-overlay');
    menuBtn.addEventListener('click', () => {
      document.documentElement.style.overflow = 'hidden';
      document.body.style.overflow = 'hidden';
      menuOverlay.classList.add('is-open');
    });
    menuClose.addEventListener('click', () => {
      document.documentElement.style.overflow = '';
      document.body.style.overflow = '';
      menuOverlay.classList.remove('is-open');
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.documentElement.style.overflow = '';
      document.body.style.overflow = '';
        menuOverlay.classList.remove('is-open');
      }
    });

    const catalogFront = document.getElementById('catalog-front');

    // 카탈로그 렌더링 (catalog-data.js)
    (function () {
      const track = document.getElementById('catalog-track');
      const supportsHover = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
      CATALOG_POSTS.forEach(function (book, i) {
        const card = document.createElement('div');
        card.className = 'catalog-card';
        card.innerHTML =
          '<a href="' + book.href + '" class="catalog-book-link">' +
            '<div class="catalog-book">' +
              '<div class="catalog-book-front" style="background-image:url(\'' + book.imgFront + '\');background-size:cover;background-position:center;"></div>' +
              (book.imgBack ? '<div class="catalog-book-back" style="background-image:url(\'' + book.imgBack + '\');background-size:cover;background-position:center;opacity:0;"></div>' : '') +
            '</div>' +
          '</a>' +
          '<a href="' + book.href + '" class="catalog-title">' + book.title + '</a>';
        if (!supportsHover) {
          card.querySelector('.catalog-book-link').addEventListener('click', function (e) {
            e.preventDefault();
            card.classList.toggle('is-flipped');
          });
        }
        track.appendChild(card);
      });
    })();
  </script>

  <script>
    (function () {
      const html = document.documentElement;
      let revealed = false;

      function reveal() {
        if (revealed) return;
        revealed = true;
        html.classList.remove('fonts-loading');
        html.classList.add('fonts-ready');
      }

      const timeoutId = setTimeout(reveal, 5000);

      Promise.all([
        document.fonts.load('400 1em "Eulyoo1945"'),
        document.fonts.load('400 1em "GothicA1"'),
        document.fonts.load('300 1em "GothicA1"'),
        document.fonts.load('500 1em "GothicA1"'),
        document.fonts.load('18px "Eulyoo1945"', '앙토냉 아르토, 자크 리비에르와의 서신'),
        document.fonts.load('18px "Eulyoo1945"', '내 영혼은 지치고, 허약하고, 슬프다.'),
        document.fonts.ready
      ]).then(() => {
        clearTimeout(timeoutId);
        requestAnimationFrame(reveal);
      }).catch(() => {
        clearTimeout(timeoutId);
        reveal();
      });
    })();
  </script>

</body>
</html>
