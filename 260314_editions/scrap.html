  <style>
    /* ── 스크랩 ── */
    .scrap-section {
      padding-bottom: 60px;
    }

    .scrap-label {
      padding: 4mm 0 4mm 4mm;
      font-size: 18px;
    }

    .scrap-grid {
      display: flex;
      flex-direction: column;
      gap: 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .scrap-row {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      gap: 20px;
    }

    .scrap-item {
      flex-shrink: 0;
    }

    .scrap-img {
      width: 100%;
      display: block;
    }

    .scrap-img img {
      width: 100%;
      display: block;
    }

    .scrap-title {
      font-size: 18px;
      margin: 8px 0 0 0;
      line-height: 1.4;
      color: var(--text);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .scrap-item:hover .scrap-title,
    .scrap-item.is-touched .scrap-title {
      opacity: 1;
    }

    /* ── 페이지네이션 ── */
    .scrap-pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 20px 0 40px 0;
    }
    .scrap-page-btn {
      background: none; border: none;
      font-family: var(--ui-font); font-size: 18px;
      color: var(--rule); cursor: pointer;
      padding: 4px 8px; letter-spacing: -0.01em;
    }
    .scrap-page-btn:hover { color: var(--text); }
    .scrap-page-btn.is-active { color: var(--text); }

    @media (max-width: 820px) {
      .scrap-row { width: 100% !important; }
      .scrap-grid { padding-left: 4mm; padding-right: 4mm; }
      .scrap-title { font-size: 15px; }
    }
  </style>
</head>

  <script src="scrap-data.js"></script>
  <script>
    // 스크랩 페이지네이션 렌더링
    (function () {
      var PER_PAGE = 24;
      var grid = document.getElementById('scrap-grid');
      var pagination = document.getElementById('scrap-pagination');
      var currentPage = 1;
      var totalPages = Math.ceil(SCRAP_ITEMS.length / PER_PAGE);

      function renderPage(page) {
        currentPage = page;
        grid.innerHTML = '';
        var start = (page - 1) * PER_PAGE;
        var items = SCRAP_ITEMS.slice(start, start + PER_PAGE);

        for (var i = 0; i < items.length; i += 2) {
          var rowEl = document.createElement('div');
          rowEl.className = 'scrap-row';
          rowEl.style.width = '80%';
          rowEl.style.margin = '0 auto';
          [items[i], items[i + 1]].forEach(function (item) {
            if (!item) return;
            var itemEl = document.createElement('div');
            itemEl.className = 'scrap-item';
            itemEl.style.width = item.width;
            itemEl.innerHTML =
              '<img class="scrap-img" src="' + item.img + '" alt="' + (item.alt||'') + '" loading="lazy">' +
              '<p class="scrap-title">' + (item.title||'') + '</p>';
            itemEl.addEventListener('touchstart', function () { itemEl.classList.add('is-touched'); }, { passive: true });
            itemEl.addEventListener('touchend', function () { itemEl.classList.remove('is-touched'); }, { passive: true });
            rowEl.appendChild(itemEl);
          });
          grid.appendChild(rowEl);
        }
        renderPagination();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function renderPagination() {
        pagination.innerHTML = '';
        if (totalPages <= 1) return;
        for (var p = 1; p <= totalPages; p++) {
          (function(p) {
            var btn = document.createElement('button');
            btn.className = 'scrap-page-btn' + (p === currentPage ? ' is-active' : '');
            btn.textContent = p;
            btn.addEventListener('click', function () { renderPage(p); });
            pagination.appendChild(btn);
          })(p);
        }
      }

      renderPage(1);
    })();
  </script>

  <script>


    const searchBtn = document.getElementById('search-btn');
    const searchClose = document.getElementById('search-close');
    const searchOverlay = document.getElementById('header-search-overlay');
    const searchInput = document.getElementById('search-input');
    searchBtn.addEventListener('click', () => { searchOverlay.classList.add('is-open'); searchInput.focus(); });
    searchClose.addEventListener('click', () => { searchOverlay.classList.remove('is-open'); });

    const menuBtn = document.getElementById('menu-btn');
    const menuClose = document.getElementById('menu-close');
    const menuOverlay = document.getElementById('menu-overlay');
    menuBtn.addEventListener('click', () => {
      
      
      document.documentElement.style.overflow = 'hidden';
      document.body.style.overflow = 'hidden';
      menuOverlay.classList.add('is-open');
    });
    menuClose.addEventListener('click', () => {
      
      
      document.documentElement.style.overflow = '';
      document.body.style.overflow = '';
      menuOverlay.classList.remove('is-open');
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        
        
        document.documentElement.style.overflow = '';
      document.body.style.overflow = '';
      menuOverlay.classList.remove('is-open');
      }
    });

  </script>

  <script>
    (function () {
      const html = document.documentElement;
      let revealed = false;

      function reveal() {
        if (revealed) return;
        revealed = true;
        html.classList.remove('fonts-loading');
        html.classList.add('fonts-ready');
      }

      const timeoutId = setTimeout(reveal, 5000);

      Promise.all([
        document.fonts.load('400 1em "Eulyoo1945"'),
        document.fonts.load('400 1em "GothicA1"'),
        document.fonts.load('300 1em "GothicA1"'),
        document.fonts.load('500 1em "GothicA1"'),
        document.fonts.load('18px "Eulyoo1945"', '앙토냉 아르토, 자크 리비에르와의 서신'),
        document.fonts.load('18px "Eulyoo1945"', '내 영혼은 지치고, 허약하고, 슬프다.'),
        document.fonts.ready
      ]).then(() => {
        clearTimeout(timeoutId);
        requestAnimationFrame(reveal);
      }).catch(() => {
        clearTimeout(timeoutId);
        reveal();
      });
    })();
  </script>
