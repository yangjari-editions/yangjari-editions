<!DOCTYPE html>
<html lang="ko">
<head>
  <script>document.documentElement.classList.add('fonts-loading');</script>

  <title>매일매일</title>
  <link rel="stylesheet" href="../common.css">
  <style>

    html, body { height: 100%; }
    body { display: flex; flex-direction: column; }

    .day-wrap {
      flex: 1; display: flex; flex-direction: column; min-height: 0;
    }

    .day-slide-area {
      flex: 1; position: relative; overflow: hidden;
      cursor: pointer; min-height: 0;
    }

    .day-slide {
      position: absolute;
      top: calc(18px * 1.15 + 8mm); left: 0; right: 0; bottom: calc(18px * 1.15 + 8mm);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
    }

    .day-slide.is-active { opacity: 1; pointer-events: auto; }

    .day-slide img {
      max-width: 100%; max-height: 100%;
      width: auto; height: auto; object-fit: contain;
      display: block; user-select: none; -webkit-user-drag: none;
      padding: 0 4mm; box-sizing: border-box;
    }

    .day-slide--text { padding: 0 4mm; box-sizing: border-box; }

    .day-slide--text .day-text-inner { width: 100%; text-align: center; }

    .day-slide--text .day-text-body {
      font-family: var(--ui-font);
      font-size: 18px; font-weight: 400;
      line-height: 1.7; letter-spacing: -0.01em; color: var(--text);
    }

    .day-caption-wrap { flex-shrink: 0; padding: 8px 4mm 10px 4mm; }

    .day-caption {
      font-size: 15px; line-height: 1.6; color: var(--text);
      font-family: var(--ui-font); min-height: 1.6em; text-align: center;
    }

    .day-caption.is-hidden { visibility: hidden; }

    .day-back {
      position: absolute;
      top: 0; left: 0;
      height: calc(18px * 1.15 + 8mm);
      display: flex;
      align-items: center;
      padding: 0 4mm;
      font-size: 18px;
      color: var(--text);
      text-decoration: none;
      z-index: 10;
      font-family: var(--ui-font);
      letter-spacing: -0.01em;
    }
    .day-back:hover { opacity: 0.5; }

    .day-counter {
      position: absolute;
      top: 0; right: 0;
      height: calc(18px * 1.15 + 8mm);
      display: flex;
      align-items: center;
      padding: 0 4mm;
      font-size: 15px;
      color: var(--text);
      font-family: var(--ui-font);
      letter-spacing: -0.01em;
      z-index: 10;
      pointer-events: none;
    }

    @media (max-width: 820px) {
      .day-caption { font-size: 14px; }
    }

  </style>
</head>
<body>

  <header class="header" style="position: relative;">
    <div class="logo"><a href="../index.html">양자리출판사</a></div>
    <nav class="nav" aria-label="주요 메뉴">
      <a href="../catalog.html">카탈로그</a><span class="spacer">　　</span>
      <a href="../text.html">텍스트</a><span class="spacer">　　</span>
      <a href="../journal.html" class="active">저널</a><span class="spacer">　　</span>
      <a href="../scrap.html">스크랩</a>
      <span class="nav-icons">
        <button aria-label="검색" id="search-btn">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="1.2"/><line x1="11.5" y1="11.5" x2="16.5" y2="16.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
        <button aria-label="메뉴" id="menu-btn">
          <svg width="18" height="14" viewBox="0 0 18 14" fill="none"><line x1="0" y1="1" x2="18" y2="1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="0" y1="7" x2="18" y2="7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="0" y1="13" x2="18" y2="13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
      </span>
    </nav>
    <div class="header-search-overlay" id="header-search-overlay">
      <input type="text" placeholder="검색" id="search-input" />
      <button class="header-search-close" id="search-close">닫기</button>
    </div>
  </header>

  <div class="menu-overlay" id="menu-overlay">
    <div class="menu-overlay-top">
      <div class="menu-overlay-spacer">&nbsp;</div>
      <div class="menu-overlay-nav">
        <span class="menu-overlay-close">
          <span style="display:inline-flex;width:18px;height:18px;"></span>
          <button id="menu-close" aria-label="메뉴 닫기">
            <svg width="18" height="14" viewBox="0 0 18 14" fill="none"><line x1="0" y1="1" x2="18" y2="1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="0" y1="7" x2="18" y2="7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="0" y1="13" x2="18" y2="13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          </button>
        </span>
      </div>
    </div>
    <div class="menu-overlay-body">
      <div class="menu-overlay-links">
        <a href="../catalog.html">카탈로그</a>
        <a href="../text.html">텍스트</a>
        <a href="../journal.html">저널</a>
        <a href="../scrap.html">스크랩</a>
        <span class="menu-overlay-spacer"></span>
        <a href="#">이메일</a>
        <a href="#">인스타그램</a>
        <a href="#">온라인스토어</a>
        <span class="menu-overlay-spacer"></span>
        <span>양자리출판사</span>
        <span style="padding-left:0.65em;">(03127)</span>
        <span style="padding-left:0.65em;">서울시 종로구</span>
        <span style="padding-left:0.65em;">대학로 47, 1212</span>
      </div>
    </div>
  </div>

  <main class="day-wrap">

    <div class="day-slide-area" id="day-slide-area">
      <a class="day-back" href="../journal.html">←</a>
      <div class="day-counter" id="day-counter">1 / 4</div>

      <div class="day-slide" data-caption="파리, 2024년 봄">
        <img src="../images/journal/260328_day/text_pg_03.webp" alt="" decoding="async" />
      </div>

      <div class="day-slide day-slide--text">
        <div class="day-text-inner">
          <div class="day-text-body" style="font-size:32px">'저는 이 책의 실용적인 디자인과 정보를 얻는 도구로서의 기능이 마음에 듭니다.'</div>
        </div>
      </div>

      <div class="day-slide" data-caption="세퍼레잇 스페이스즈에서 봄">
        <img src="../images/journal/260328_day/20250806_05.webp" alt="" decoding="async" />
      </div>

      <div class="day-slide day-slide--text">
        <div class="day-text-inner">
          <div class="day-text-body" style="font-size:32px">'책장을 넘기다보면 끊임없이 새로운 것을 발견하게 된다.'</div>
        </div>
      </div>
    </div>

    <div class="day-caption-wrap">
      <div class="day-caption" id="day-caption"></div>
    </div>

  </main>

  <script>

    const slides    = Array.from(document.querySelectorAll('.day-slide'));
    const captionEl = document.getElementById('day-caption');
    const slideArea = document.getElementById('day-slide-area');
    const counterEl = document.getElementById('day-counter');
    let idx = 0;

    function update() {
      slides.forEach((s, i) => s.classList.toggle('is-active', i === idx));
      const cur = slides[idx];
      const isText = cur.classList.contains('day-slide--text');
      if (isText) {
        captionEl.textContent = '';
        captionEl.classList.add('is-hidden');
      } else {
        captionEl.textContent = cur.dataset.caption || '';
        captionEl.classList.remove('is-hidden');
      }
      counterEl.textContent = (idx + 1) + ' / ' + slides.length;
    }

    function goNext() { idx = (idx + 1) % slides.length; update(); }
    function goPrev() { idx = (idx - 1 + slides.length) % slides.length; update(); }

    slideArea.addEventListener('click', goNext);

    let tx = 0;
    slideArea.addEventListener('touchstart', e => { tx = e.changedTouches[0].clientX; }, { passive: true });
    slideArea.addEventListener('touchend', e => {
      const d = tx - e.changedTouches[0].clientX;
      if (Math.abs(d) > 40) { d > 0 ? goNext() : goPrev(); }
    }, { passive: true });

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') goNext();
      if (e.key === 'ArrowLeft')  goPrev();
    });

    update();

    const searchBtn     = document.getElementById('search-btn');
    const searchClose   = document.getElementById('search-close');
    const searchOverlay = document.getElementById('header-search-overlay');
    const searchInput   = document.getElementById('search-input');
    searchBtn.addEventListener('click', () => { searchOverlay.classList.add('is-open'); searchInput.focus(); });
    searchClose.addEventListener('click', () => { searchOverlay.classList.remove('is-open'); });

    const menuBtn     = document.getElementById('menu-btn');
    const menuClose   = document.getElementById('menu-close');
    const menuOverlay = document.getElementById('menu-overlay');
    menuBtn.addEventListener('click', () => { document.documentElement.style.overflow = 'hidden'; document.body.style.overflow = 'hidden'; menuOverlay.classList.add('is-open'); });
    menuClose.addEventListener('click', () => { document.documentElement.style.overflow = ''; document.body.style.overflow = ''; menuOverlay.classList.remove('is-open'); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { document.documentElement.style.overflow = ''; document.body.style.overflow = ''; menuOverlay.classList.remove('is-open'); } });

  </script>

  <script>
    (function () {
      const html = document.documentElement; let revealed = false;
      function reveal() { if (revealed) return; revealed = true; html.classList.remove('fonts-loading'); html.classList.add('fonts-ready'); }
      const t = setTimeout(reveal, 5000);
      Promise.all([document.fonts.load('400 1em "GothicA1"'), document.fonts.ready])
        .then(() => { clearTimeout(t); requestAnimationFrame(reveal); }).catch(() => { clearTimeout(t); reveal(); });
    })();
  </script>

</body>
</html>
