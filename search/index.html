  <style>
    .result-section { padding: 0 4mm 40px 4mm; border-bottom: 1px solid var(--rule); }
    .result-section-label { font-size: 18px; line-height: 1.15; padding: 4mm 0 4mm 0; }
    .result-empty { font-size: 15px; color: var(--text); display: none; padding-left: 4mm; }
    @media (max-width: 820px) { .result-empty { text-align: left; } }

    /* 공통 카드 — 썸네일 + 텍스트 1열 */
    .result-list { display: flex; flex-direction: column; }
    .result-item {
      display: flex; align-items: center; gap: 16px;
      padding: 12px 0;
      border-bottom: 1px dashed var(--rule);
      text-decoration: none; color: inherit;
    }
    .result-item:last-child { border-bottom: none; }
    .result-item:hover .result-item-title { opacity: 0.6; }

    .result-thumb {
      width: 72px; height: 48px;
      flex-shrink: 0;
      background: #d0cfc9;
      overflow: hidden;
    }
    .result-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .result-thumb--book {
      width: 36px; height: 54px;
    }

    .result-item-info { display: flex; flex-direction: column; gap: 3px; }
    .result-item-title { font-size: 18px; line-height: 1.4; }
    .result-item-meta { font-size: 14px; color: var(--rule); }

    .results-wrap { display: none; }
    /* ── 뉴스레터 ── */
    .menu-newsletter-wrap { display: flex; flex-direction: column; }
    .menu-newsletter-btn {
      background: none; border: none; cursor: pointer;
      font-family: var(--ui-font); font-size: 18px;
      color: var(--text); text-align: left; padding: 0;
      line-height: 1.75; letter-spacing: -0.01em;
    }
    .menu-newsletter-btn:hover { opacity: 0.5; }
    .menu-newsletter-form { display: flex; flex-direction: column; gap: 0; }
    .menu-newsletter-input {
      background: none; border: none;
      font-family: var(--ui-font); font-size: 18px;
      color: var(--text); padding: 0; outline: none;
      letter-spacing: -0.01em; width: 100%;
      line-height: 1.75; display: block; height: 1.75em;
    }
    .menu-newsletter-input::placeholder { color: var(--text); opacity: 0.5; }
    .menu-newsletter-submit {
      background: none; border: none; cursor: pointer;
      font-family: var(--ui-font); font-size: 18px;
      color: var(--text); text-align: left; padding: 0;
      line-height: 1.75; letter-spacing: -0.01em;
    }
    .menu-newsletter-submit:hover { opacity: 0.5; }
    .menu-newsletter-done { font-size: 18px; line-height: 1.75; color: var(--text); }
  </style>

  <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script src="catalog-data.js"></script>

  <script>
    function match(str, q) {
      return (str || '').toLowerCase().includes(q.toLowerCase());
    }

    function makeItem(href, imgSrc, isBook, title, meta) {
      const a = document.createElement('a');
      a.className = 'result-item';
      a.href = href;
      const thumbClass = isBook ? 'result-thumb result-thumb--book' : 'result-thumb';
      a.innerHTML =
        '<div class="' + thumbClass + '">' +
          (imgSrc ? '<img src="' + imgSrc + '" alt="" decoding="async" loading="lazy">' : '') +
        '</div>' +
        '<div class="result-item-info">' +
          '<div class="result-item-title">' + title + '</div>' +
          (meta ? '<div class="result-item-meta">' + meta + '</div>' : '') +
        '</div>';
      return a;
    }

    function runSearch(q) {
      const wrap = document.getElementById('results-wrap');
      if (!q) { wrap.style.display = 'none'; return; }
      wrap.style.display = 'block';

      // 카탈로그
      const catList = document.getElementById('result-catalog-list');
      const catEmpty = document.getElementById('result-catalog-empty');
      catList.innerHTML = '';
      const catR = CATALOG_POSTS.filter(b => match(b.title, q) || match(b.author, q));
      if (catR.length) {
        catEmpty.style.display = 'none';
        catR.forEach(b => catList.appendChild(makeItem(b.href, b.imgFront, true, b.title, '')));
      } else {
        catEmpty.style.display = 'block';
      }

      // 텍스트
      const textList = document.getElementById('result-text-list');
      const textEmpty = document.getElementById('result-text-empty');
      textList.innerHTML = '';
      const textR = TEXT_POSTS.filter(p => match(p.title, q) || match(p.desc, q) || match(p.translator, q) || match(p.author, q));
      if (textR.length) {
        textEmpty.style.display = 'none';
        textR.forEach(p => textList.appendChild(makeItem(p.href, p.img, false, (p.author ? '<span>' + p.author + '</span><br>' : '') + p.title, (p.translator ? p.translator + ' · ' : '') + p.date)));
      } else {
        textEmpty.style.display = 'block';
      }

      // 저널
      const journalList = document.getElementById('result-journal-list');
      const journalEmpty = document.getElementById('result-journal-empty');
      journalList.innerHTML = '';
      const journalR = JOURNAL_POSTS.filter(p => match(p.title, q) || match(p.author, q) || match(p.date, q));
      if (journalR.length) {
        journalEmpty.style.display = 'none';
        journalR.forEach(p => journalList.appendChild(makeItem(p.href, p.img, false, (p.author ? '<span>' + p.author + '</span><br>' : '') + p.title, p.date)));
      } else {
        journalEmpty.style.display = 'block';
      }

    }

    const params = new URLSearchParams(window.location.search);
    const initQ = params.get('q') || '';
    if (initQ) runSearch(initQ);

    const searchBtn = document.getElementById('search-btn');
    const searchClose = document.getElementById('search-close');
    const searchOverlay = document.getElementById('header-search-overlay');
    const searchInput = document.getElementById('search-input');
    searchBtn.addEventListener('click', () => { searchOverlay.classList.add('is-open'); searchInput.focus(); });
    searchClose.addEventListener('click', () => { searchOverlay.classList.remove('is-open'); });
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && searchInput.value.trim()) {
        const newQ = searchInput.value.trim();
        history.replaceState(null, '', '?q=' + encodeURIComponent(newQ));
        searchOverlay.classList.remove('is-open');
        runSearch(newQ);
      }
    });

    const menuBtn = document.getElementById('menu-btn');
    const menuClose = document.getElementById('menu-close');
    const menuOverlay = document.getElementById('menu-overlay');
    menuBtn.addEventListener('click', () => { document.documentElement.style.overflow = 'hidden'; document.body.style.overflow = 'hidden'; menuOverlay.classList.add('is-open'); });
    menuClose.addEventListener('click', () => { document.documentElement.style.overflow = ''; document.body.style.overflow = ''; menuOverlay.classList.remove('is-open'); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { document.documentElement.style.overflow = ''; document.body.style.overflow = ''; menuOverlay.classList.remove('is-open'); } });
  </script>

  <script>
    (function () {
      const html = document.documentElement; let revealed = false;
      function reveal() { if (revealed) return; revealed = true; html.classList.remove('fonts-loading'); html.classList.add('fonts-ready'); }
      const t = setTimeout(reveal, 5000);
      Promise.all([document.fonts.load('400 1em "Eulyoo1945"'), document.fonts.load('400 1em "GothicA1"'), document.fonts.ready])

        .then(() => { clearTimeout(t); requestAnimationFrame(reveal); }).catch(() => { clearTimeout(t); reveal(); });
    })();
  </script>


  <script id="site-menu-script">
    (function () {
      const NEWSLETTER_URL = 'https://script.google.com/a/macros/yangjari-editions.com/s/AKfycbye3PjtFxT5sqjFrRoWQkpYe0nVOg1dDmFZ_YD1Q7uH6bdsnCPsmkDwTZ6nMQVRkJRIyQ/exec';
      const html = document.documentElement;
      const body = document.body;
      const searchBtn = document.getElementById('search-btn');
      const searchOverlay = document.getElementById('header-search-overlay');
      const searchInput = document.getElementById('search-input');
      const searchClose = document.getElementById('search-close');
      const menuBtn = document.getElementById('menu-btn');
      const menuClose = document.getElementById('menu-close');
      const menuOverlay = document.getElementById('menu-overlay');

      function closeSearch() {
        if (!searchOverlay || !searchInput) return;
        searchOverlay.classList.remove('is-open');
        searchInput.value = '';
      }

      function closeMenu() {
        html.style.overflow = '';
        body.style.overflow = '';
        if (menuOverlay) menuOverlay.classList.remove('is-open');
      }

      if (searchBtn && searchOverlay && searchInput) {
        searchBtn.addEventListener('click', function () {
          searchOverlay.classList.add('is-open');
          searchInput.focus();
        });
        searchInput.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' && searchInput.value.trim()) {
            window.location.href = '/search/?q=' + encodeURIComponent(searchInput.value.trim());
          }
        });
      }
      if (searchClose) searchClose.addEventListener('click', closeSearch);

      if (menuBtn && menuOverlay) {
        menuBtn.addEventListener('click', function () {
          html.style.overflow = 'hidden';
          body.style.overflow = 'hidden';
          menuOverlay.classList.add('is-open');
        });
      }
      if (menuClose) menuClose.addEventListener('click', closeMenu);

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          closeSearch();
          closeMenu();
        }
        if (e.key === 'Enter') {
          const nameEl = document.getElementById('newsletter-name');
          const emailEl = document.getElementById('newsletter-email');
          if (document.activeElement === nameEl) { emailEl.focus(); e.preventDefault(); }
          else if (document.activeElement === emailEl) { window.submitNewsletter(); e.preventDefault(); }
        }
      });

      window.openNewsletter = function () {
        const btn = document.getElementById('menu-newsletter-btn');
        const form = document.getElementById('menu-newsletter-form');
        const name = document.getElementById('newsletter-name');
        if (btn) btn.style.display = 'none';
        if (form) form.style.display = 'flex';
        if (name) name.focus();
      };

      window.submitNewsletter = function () {
        const nameEl = document.getElementById('newsletter-name');
        const emailEl = document.getElementById('newsletter-email');
        const submitBtn = document.getElementById('newsletter-submit');
        const form = document.getElementById('menu-newsletter-form');
        const done = document.getElementById('newsletter-done');
        const name = nameEl ? nameEl.value.trim() : '';
        const email = emailEl ? emailEl.value.trim() : '';
        if (!name || !email || !submitBtn) return;
        submitBtn.textContent = '전송 중...';
        submitBtn.style.pointerEvents = 'none';
        fetch(NEWSLETTER_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({ name, email }),
        }).catch(function () {});
        setTimeout(function () {
          if (form) form.style.display = 'none';
          if (done) done.style.display = 'block';
        }, 1000);
      };
    })();
  </script>
