    /* ── 카탈로그 섹션 ── */
    .catalog-section {
    }

    .catalog-label {
      padding: 4mm 0 4mm 4mm;
      font-size: 18px;
      line-height: 1.15;
    }

    .catalog-track {
      display: flex;
      justify-content: center;
      padding: 0 0 40px 0;
    }

    .catalog-card {
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .catalog-book {
      width: 300px;
      aspect-ratio: 110 / 195;
      position: relative;
      overflow: hidden;
    }

    .catalog-book-front,
    .catalog-book-back {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
    }

    .catalog-book-back { opacity: 0; }



    .catalog-title {
      font-size: 18px;
      text-align: center;
      line-height: 1.4;
      max-width: 200px;
      color: inherit;
      text-decoration: none;
      display: block;
    }

    .catalog-book-link {
      display: block;
      text-decoration: none;
    }

    /* ── 뉴스레터 ── */
    .menu-newsletter-wrap { display: flex; flex-direction: column; }
    .menu-newsletter-btn {
      background: none; border: none; cursor: pointer;
      font-family: var(--ui-font); font-size: 18px;
      color: var(--text); text-align: left; padding: 0;
      line-height: 1.75; letter-spacing: -0.01em;
    }
    .menu-newsletter-btn:hover { opacity: 0.5; }
    .menu-newsletter-form { display: flex; flex-direction: column; gap: 0; }
    .menu-newsletter-input {
      background: none; border: none;
      font-family: var(--ui-font); font-size: 18px;
      color: var(--text); padding: 0; outline: none;
      letter-spacing: -0.01em; width: 100%;
      line-height: 1.75; display: block; height: 1.75em;
    }
    .menu-newsletter-input::placeholder { color: var(--text); opacity: 0.5; }
    .menu-newsletter-submit {
      background: none; border: none; cursor: pointer;
      font-family: var(--ui-font); font-size: 18px;
      color: var(--text); text-align: left; padding: 0;
      line-height: 1.75; letter-spacing: -0.01em;
    }
    .menu-newsletter-submit:hover { opacity: 0.5; }
    .menu-newsletter-done { font-size: 18px; line-height: 1.75; color: var(--text); }
  </style>

  <script src="catalog-data.js"></script>
  <script>


    const searchBtn = document.getElementById('search-btn');
    const searchClose = document.getElementById('search-close');
    const searchOverlay = document.getElementById('header-search-overlay');
    const searchInput = document.getElementById('search-input');
    searchBtn.addEventListener('click', () => { searchOverlay.classList.add('is-open'); searchInput.focus(); });
    searchClose.addEventListener('click', () => { searchOverlay.classList.remove('is-open'); });
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && searchInput.value.trim()) {
        window.location.href = '/search/?q=' + encodeURIComponent(searchInput.value.trim());
      }
    });

    const menuBtn = document.getElementById('menu-btn');
    const menuClose = document.getElementById('menu-close');
    const menuOverlay = document.getElementById('menu-overlay');
    menuBtn.addEventListener('click', () => {
      document.documentElement.style.overflow = 'hidden';
      document.body.style.overflow = 'hidden';
      menuOverlay.classList.add('is-open');
    });
    menuClose.addEventListener('click', () => {
      document.documentElement.style.overflow = '';
      document.body.style.overflow = '';
      menuOverlay.classList.remove('is-open');
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.documentElement.style.overflow = '';
      document.body.style.overflow = '';
        menuOverlay.classList.remove('is-open');
      }
    });

    // 카탈로그 렌더링
    (function () {
      const track = document.getElementById('catalog-track');
      CATALOG_POSTS.forEach(function (book) {
        const card = document.createElement('div');
        card.className = 'catalog-card';
        card.innerHTML =
          '<a href="' + book.href + '" class="catalog-book-link">' +
            '<div class="catalog-book">' +
              '<div class="catalog-book-front" style="background-image:url(\'' + book.imgFront + '\');background-size:cover;background-position:center;"></div>' +
            '</div>' +
          '</a>' +
          '<a href="' + book.href + '" class="catalog-title">' + book.title + '</a>';
        track.appendChild(card);
      });
    })();
  </script>

  <script>
    (function () {
      const html = document.documentElement;
      let revealed = false;

      function reveal() {
        if (revealed) return;
        revealed = true;
        html.classList.remove('fonts-loading');
        html.classList.add('fonts-ready');
      }

      const timeoutId = setTimeout(reveal, 5000);

      Promise.all([
        document.fonts.load('400 1em "Eulyoo1945"'),
        document.fonts.load('400 1em "GothicA1"'),
        document.fonts.load('300 1em "GothicA1"'),
        document.fonts.load('500 1em "GothicA1"'),
        document.fonts.load('18px "Eulyoo1945"', '앙토냉 아르토, 자크 리비에르와의 서신'),
        document.fonts.load('18px "Eulyoo1945"', '내 영혼은 지치고, 허약하고, 슬프다.'),
        document.fonts.ready
      ]).then(() => {
        clearTimeout(timeoutId);
        requestAnimationFrame(reveal);
      }).catch(() => {
        clearTimeout(timeoutId);
        reveal();
      });
    })();
  </script>


  <script id="site-menu-script">
    (function () {
      const NEWSLETTER_URL = 'https://script.google.com/a/macros/yangjari-editions.com/s/AKfycbye3PjtFxT5sqjFrRoWQkpYe0nVOg1dDmFZ_YD1Q7uH6bdsnCPsmkDwTZ6nMQVRkJRIyQ/exec';
      const html = document.documentElement;
      const body = document.body;
      const searchBtn = document.getElementById('search-btn');
      const searchOverlay = document.getElementById('header-search-overlay');
      const searchInput = document.getElementById('search-input');
      const searchClose = document.getElementById('search-close');
      const menuBtn = document.getElementById('menu-btn');
      const menuClose = document.getElementById('menu-close');
      const menuOverlay = document.getElementById('menu-overlay');

      function closeSearch() {
        if (!searchOverlay || !searchInput) return;
        searchOverlay.classList.remove('is-open');
        searchInput.value = '';
      }

      function closeMenu() {
        html.style.overflow = '';
        body.style.overflow = '';
        if (menuOverlay) menuOverlay.classList.remove('is-open');
      }

      if (searchBtn && searchOverlay && searchInput) {
        searchBtn.addEventListener('click', function () {
          searchOverlay.classList.add('is-open');
          searchInput.focus();
        });
        searchInput.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' && searchInput.value.trim()) {
            window.location.href = '/search/?q=' + encodeURIComponent(searchInput.value.trim());
          }
        });
      }
      if (searchClose) searchClose.addEventListener('click', closeSearch);

      if (menuBtn && menuOverlay) {
        menuBtn.addEventListener('click', function () {
          html.style.overflow = 'hidden';
          body.style.overflow = 'hidden';
          menuOverlay.classList.add('is-open');
        });
      }
      if (menuClose) menuClose.addEventListener('click', closeMenu);

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          closeSearch();
          closeMenu();
        }
        if (e.key === 'Enter') {
          const nameEl = document.getElementById('newsletter-name');
          const emailEl = document.getElementById('newsletter-email');
          if (document.activeElement === nameEl) { emailEl.focus(); e.preventDefault(); }
          else if (document.activeElement === emailEl) { window.submitNewsletter(); e.preventDefault(); }
        }
      });

      window.openNewsletter = function () {
        const btn = document.getElementById('menu-newsletter-btn');
        const form = document.getElementById('menu-newsletter-form');
        const name = document.getElementById('newsletter-name');
        if (btn) btn.style.display = 'none';
        if (form) form.style.display = 'flex';
        if (name) name.focus();
      };

      window.submitNewsletter = function () {
        const nameEl = document.getElementById('newsletter-name');
        const emailEl = document.getElementById('newsletter-email');
        const submitBtn = document.getElementById('newsletter-submit');
        const form = document.getElementById('menu-newsletter-form');
        const done = document.getElementById('newsletter-done');
        const name = nameEl ? nameEl.value.trim() : '';
        const email = emailEl ? emailEl.value.trim() : '';
        if (!name || !email || !submitBtn) return;
        submitBtn.textContent = '전송 중...';
        submitBtn.style.pointerEvents = 'none';
        fetch(NEWSLETTER_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({ name, email }),
        }).catch(function () {});
        setTimeout(function () {
          if (form) form.style.display = 'none';
          if (done) done.style.display = 'block';
        }, 1000);
      };
    })();
  </script>
